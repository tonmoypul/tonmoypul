<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basic Syntax for &lt;iframe&gt;</title>
</head>

<body>
  <iframe src="video-url" width="width-value" height="height-value" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer autoplay clipboard-write encrypted-media gyroscope picture-in-picture web-share"></iframe>
  <!-- Here, the referrerpolicy tells the browser that, when you are on the same site, the video will share all the data it holds, but when on other sites, only the video will be shared, not any other information -->
</body>

</html>
