<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Use cases of &lt;abbr&gt;</title>
</head>

<body>
  <h2>Without title attribute</h2>
  <p><abbr>HTML</abbr> is the foundation of the web.
</p>

<h2>With the title attribute</h2>
<p><abbr title="Hyper Text Markup Language">HTML</abbr> is the foundation of the web.</p>
</body>

</html>
