<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Overlay any image</title>
  <style>
    .imageContainer {
      max-width: 600px;
      max-height: 600px;
      width: 300px;
      height: 300px;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
      url("https://cdn.pixabay.com/photo/2026/02/11/15/36/dpaolaphoto-ipanema-10117989_1280.jpg");
      background-size: cover;
      background-position: center;
    }
  </style>
</head>

<body>
  <div class="imageContainer"></div>
</body>

</html>
