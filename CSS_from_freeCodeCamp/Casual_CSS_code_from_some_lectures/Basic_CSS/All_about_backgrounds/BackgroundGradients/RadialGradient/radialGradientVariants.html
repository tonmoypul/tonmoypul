<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Variants of radial gradient</title>
  <style>
    body {
      background-color: rgba(55, 85, 36, 1);
      color: white;
      padding-left: 30px;
    }
    
    h2 {
      margin: 30px auto 7px;
    }
    
    .default {
      width: 400px;
      height: 300px;
      background: radial-gradient(red,blue);
    }
    
    .circle {
      width: 400px;
      height: 300px;
      background: radial-gradient(circle, red, blue);
    } 
    
    .customSizePosition {
      width: 400px;
      height: 300px;
      background: radial-gradient(circle 400px at top left, red, blue);
    }
    
    .closestSide {
      width: 400px;
      height: 300px;
      background: radial-gradient(circle closest-side at 30% 50%, red, blue);
    }
    
    .multiStop {
      width: 400px;
      height: 300px;
      background: radial-gradient(circle, red 0%, blue 40%, green 60%, yellow 100%);
    }
    
    .hardStop {
      width: 400px;
      height: 300px;
      background: radial-gradient(circle, red 50%, blue 50%);
    }
    
    .spotlightEffect {
      width: 400px;
      height: 300px;
      background: radial-gradient(ellipse at 20% 30%, rgba(255, 255, 255, 1), transparent 60%);
    }
    
    .repeating {
      width: 400px;
      height: 300px;
      background: repeating-radial-gradient(circle, #fff 0px 10px, #000 10px 20px);
    }
  </style>
</head>

<body>
  <h2>Default Ellipse form center</h2>
  <div class="default"></div>
  <h2>Circle</h2>
  <div class="circle"></div>
  <h2>Custom Size And Position</h2>
  <div class="customSizePosition"></div>
  <h2>Closest Side</h2>
  <div class="closestSide"></div>
  <h2>Multi-stop</h2>
  <div class="multiStop"></div>
  <h2>Hard Stop</h2>
  <div class="hardStop"></div>
  <h2>Off-center spotlight effect</h2>
  <div class="spotlightEffect"></div>
  <h2>Repeating</h2>
  <div class="repeating"></div>
</body>

</html>
