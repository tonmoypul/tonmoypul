<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simplest table to create</title>
</head>

<body>
  <table border="1" cellspacing="0" cellpadding="5">
    <caption>Here goes the caption</caption>
    <thead>
      <tr>
        <th colspan="2">The title of this table</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>First Row</th>
        <td>First Data</td>
      </tr>
      <tr>
        <th>Second Row</th>
        <td>Second Data</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <th>The footer of this table, which might contain date of publication, author credits, or other meta information.</th>
        <td>Here goes the data</td>
      </tr>
    </tfoot>
  </table>
</body>

</html>
