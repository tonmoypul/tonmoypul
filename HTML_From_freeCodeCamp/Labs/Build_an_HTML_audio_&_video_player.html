<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML &lt;audio&gt; & &lt;video&gt; lab</title>
</head>

<body>
  <h1>Html Audio And Video Element Lab</h1>
  <section>
    <h2>Some kinda JS video</h2>
    <video controls loop autoplay muted width="640">
      <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
      <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.webm" type="video/webm">
      <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.ogg" type="video/ogg">
      <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mov" type="video/quicktime">
    </video>
  </section>
  <section>
    <h2>Some kinda fCC song</h2>
    <audio controls loop muted>
      <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/we-are-going-to-make-it.ogg" type="audio/ogg">
      <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/we-are-going-to-make-it.wav" type="audio/wav">
      <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/we-are-going-to-make-it.mp3" type="audio/mpeg">
    </audio>
  </section>
</body>

</html>
