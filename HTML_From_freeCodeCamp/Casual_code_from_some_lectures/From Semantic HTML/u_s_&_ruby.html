<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>uses of &lt;u&gt;, &lt;s&gt; and &lt;ruby&gt;</title>
</head>

<body>
  <p>You can use the unarticulated annotation element to highlight <u>incorrest</u> <u>splling</u> <u>isses</u></p>
  <!-- Use this element only when you need to indicate unarticulated annotation in inline text. But if you just want to underline then use CSS -->
  
  <p><s>Tomorrow's hike will be meeting at noon</s></p>
  <p>Due to unfroeseen weather the hike has been cancelled.</p>
  <!-- Use this when text is no longer accurate or relevant -->
  
  <ruby>明日 <rp>(</rp><rt>Ashita</rt><rp>)</rp></ruby>
  <!-- Just ignore this one 😤-->
</body>

</html>
