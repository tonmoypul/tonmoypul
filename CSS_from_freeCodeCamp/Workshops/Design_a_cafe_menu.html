<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cafe Menu</title>
  <style>
    body {
      background-image: url(https://cdn.freecodecamp.org/curriculum/css-cafe/beans.jpg);
    }
    
    h1,h2,p {
      text-align: center;
    }
    
    .menu {
      width: 80%;
      background-color: burlywood;
      margin-left: auto;
      margin-right: auto;
    }
    
    .flavour {
      text-align: left;
      width: 50%;
    }
    
    .price {
      text-align: right;
      width: 50%;
    }
    

    .item p {
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="menu">
    <main>
      <h1>CAMPER CAFE</h1>
      <p>Est. 2020</p>
      <section>
        <h2>Coffe</h2>
        <article class="item">
          <p class="flavour">French Vanilla</p><p class="price">3.00</p>
        </article>
        <article class="item">
          <p class="flavour">Caramel Macchiato</p>
          <p class="price">3.75</p>
        </article>
        <article class="item">
          <p class="flavour">Pumpkin Spice</p>
          <p class="price">3.50</p>
        </article>
        <article class="item">
          <p class="flavour">Hazelnut</p>
          <p class="price">4.00</p>
        </article>
        <article class="item">
          <p class="flavour">Mocha</p>
          <p class="price">4.50</p>
        </article>
      </section>
      <section></section>
    </main>
  </div>
</body>

</html>
