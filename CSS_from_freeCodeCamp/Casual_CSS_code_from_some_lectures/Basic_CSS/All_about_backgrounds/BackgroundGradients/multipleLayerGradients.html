<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Using Multiple Layer Of Gradients</title>
  <style>
    .multipleGradients {
      width: 400px;
      height: 300px;
      background:
  linear-gradient(to right, rgba(255,0,0,0.5), transparent),
  radial-gradient(circle at center, 
  white, black);
    }
  </style>
</head>

<body>
  <div class="multipleGradients"></div>
</body>

</html>
